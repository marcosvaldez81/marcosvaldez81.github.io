<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"></stop>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.04"></stop>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"></stop>
    </linearGradient>
    
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"></stop>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.10"></stop>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"></stop>
    </linearGradient>
    
    <radialGradient id="specular" cx="50%" cy="0%" r="55%" fx="50%" fy="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"></stop>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"></stop>
    </radialGradient>
    
    <linearGradient id="shadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"></stop>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.28"></stop>
    </linearGradient>
  </defs>

  
  <rect width="200" height="200" rx="32" fill="#000000"></rect>

  
  <rect width="200" height="200" rx="32" fill="url(#shadow)"></rect>

  
  <text x="100" y="104" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="118" fill="rgb(83,178,145)" letter-spacing="-2">M</text>

  
  <rect width="200" height="200" rx="32" fill="url(#gloss)"></rect>

  
  <rect width="200" height="200" rx="32" fill="url(#specular)"></rect>

  
  <rect x="1" y="1" width="198" height="198" rx="31" fill="none" stroke="url(#edge)" stroke-width="1.5"></rect>
</svg>